# OrderFlow Pipeline Factory — Payments Entity (Demo)
# This is the live payments pipeline definition used for Phase 9 proof.

source:
  name: payments
  type: postgres
  connection:
    server_name: orderflow
    database: orderflow
    schema: public
    table: payments

columns:
  - name: id
    source_type: serial
    clickhouse_type: Int32
    is_key: true
  - name: order_id
    source_type: integer
    clickhouse_type: Int32
  - name: amount
    source_type: "numeric(10,2)"
    clickhouse_type: "Decimal(10,2)"
    source_is_decimal: true
  - name: method
    source_type: varchar
    clickhouse_type: String
  - name: card_last_four
    source_type: varchar
    clickhouse_type: String
    pii: true
  - name: status
    source_type: varchar
    clickhouse_type: String
  - name: created_at
    source_type: "timestamp with time zone"
    clickhouse_type: DateTime
    is_timestamp: true
  - name: updated_at
    source_type: "timestamp with time zone"
    clickhouse_type: DateTime
    is_timestamp: true

silver:
  engine: ReplacingMergeTree
  version_column: updated_at_dt
  order_by: [id]
  partition_by: "toYYYYMM(created_at_dt)"

delete_handling: soft

dag:
  schedule: "@hourly"
  depends_on_dag: orderflow_batch_ingestion
