name: Version Check

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  version-check:
    name: Validate component versions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Check compatibility matrix
        run: python3 scripts/check_versions.py

      - name: Check version drift across files
        run: python3 scripts/check_version_drift.py

      - name: Check Python environment conflicts (dry-run)
        run: |
          pip install --dry-run \
            dbt-core==1.8.0 \
            dbt-clickhouse==1.8.4 \
            dbt-spark==1.8.0 \
            great-expectations==0.18.21 \
            apache-airflow==2.10.* \
            apache-airflow-providers-cncf-kubernetes \
            apache-airflow-providers-openlineage \
            clickhouse-driver 2>&1 | grep -i "conflict\|error" || true
